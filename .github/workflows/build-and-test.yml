name: build-and-test

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: Debug

    steps:
      - uses: actions/checkout@v3
      
      - name: Install GCC-11
        run: sudo apt install gcc-11 g++-11

      - name: Create Build Environment
        run: pip install meson && meson setup ${{runner.workspace}}/build

      - name: Build
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: meson compile

      - name: Test
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: meson test
